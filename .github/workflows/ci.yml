name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Lint & Tests
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # PHPUnit ^10.0 (from composer.json) requires PHP 8.1+.
        # PHP 8.0 can run PHPUnit 9 but composer.json requires ^10; use 8.1+ for CI.
        # Add 8.3 once you have confirmed no deprecation failures.
        php: ["8.1", "8.2"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sodium, mbstring, json, pcre
          coverage: none   # flip to 'xdebug' if you add coverage reporting

      - name: Validate composer.json
        run: composer validate --strict

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # Syntax-check every PHP file in the plugin (excluding vendor and test bootstrap)
      - name: PHP syntax lint
        run: |
          find . \
            -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./tests/bootstrap/*" \
            -print0 \
          | xargs -0 php -l \
          | grep -v "^No syntax errors" && echo "Syntax errors found above" && exit 1 || true

      - name: Run PHPUnit
        run: composer test
