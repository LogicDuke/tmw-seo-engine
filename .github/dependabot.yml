version: 2

updates:
  # Keep Composer dev dependencies (PHPUnit) up to date.
  # Production `require` is intentionally minimal (php >=8.0 only),
  # so this primarily tracks PHPUnit patch/minor releases.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
    # Ignore major PHPUnit version bumps — those require deliberate upgrade testing.
    ignore:
      - dependency-name: "phpunit/phpunit"
        update-types: ["version-update:semver-major"]

  # Keep GitHub Actions pinned to their latest patch releases.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
